  .relbox { margin-top: 4px; }

<body>
<header>
  <h1>산업분류코드 검색</h1>
  <p>KSIC 11차 · 분류 해설 · 10차 신구연계 · 국세청 업종코드 · 중소기업 기준</p>
</header>

<div class="wrap">
  <div class="searchbox">
    <input id="q" type="search" placeholder="물품·업종·KSIC코드·국세청 업종코드 입력 (예: 빵, 아스팔트, 24111, 011000)" autofocus autocomplete="off" />
    <button onclick="runSearch()">검색</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-search" onclick="switchTab('search')">코드 검색</button>
    <button class="tab" id="tab-browse" onclick="switchTab('browse')">분류 탐색</button>
  </div>
  <div id="panel-search">
    <div class="hint" id="hint">데이터 불러오는 중…</div>
    <div id="results"><div class="loading">데이터를 불러오고 있습니다…</div></div>
  </div>
  <div id="panel-browse" style="display:none;">
    <div class="tree" id="treeroot"></div>
  </div>
  <footer>
    출처: 통계청 통계분류포털(kssc.kostat.go.kr) 한국표준산업분류 11차 (10차 연계 포함)<br/>
    국세청 업종코드: 홈택스 업종코드-11차 표준산업분류 연계표 · 중소기업 기준: 중소기업기본법 시행령 별표1(2025.10.1)·별표3(2025.9.1)<br/>
    본 검색 결과는 참고용이며, 정확한 분류·기준은 각 기관 공식 자료에서 확인하세요.
  </footer>
</div>
<div class="toast" id="toast"></div>

<script>
const LV_NAME = { 1: '대분류', 2: '중분류', 3: '소분류', 4: '세분류', 5: '세세분류' };
let NODES = new Map();      // code -> {code,name,level,parent}
let CHILDREN = new Map();   // code -> [child codes]
let TERMS = [];             // [{code, term, norm}]
let CODE_TERMS = new Map(); // code -> [terms]
let NAME_INDEX = [];        // [{code, norm, level}]
let NEW2OLD = new Map();    // 11차 code -> [{old, oldName}]
let OLD2NEW = new Map();    // 10차 code -> [11차 codes]
let UPJONG_BY_K = new Map(); // KSIC5 -> [{u, un}]  국세청 업종코드
let UPJONG_BY_U = new Map(); // 업종코드6 -> [{k, un}]
let UPJONG_TERMS = [];       // [{u, un, k, norm}]
let DESC = {};               // code -> {e: 영문명, d: 설명}
let REFS_IN = new Map();      // code -> [codes that reference it in their 제외/설명]
let lastResults = [];
let lastQuery = '';

/* 중소기업기본법 시행령 별표1(중소기업, 개정 2025.10.1)·별표3(소기업, 개정 2025.9.1)
   주된 업종별 평균매출액등 규모 기준(억원). 분류기호는 KSIC 대분류/중분류 기준. */
const SME_BY_DIV = { // 중분류(2자리) 우선 적용
  '17':1800,'24':1800,'28':1800,'14':1500,'15':1500,'32':1500,
  '10':1200,'20':1200,'22':1200,'25':1200,'29':1200,'30':1200,'31':1200,
  '12':1000,'13':1000,'16':1000,'19':1000,'26':1000,'33':1000,'36':1000,
  '11':800,'18':800,'21':800,'23':800,'27':800,'34':600,'76':400,
};
const SME_BY_SEC = {
  F:1200,G:1200,A:1000,B:1000,D:1000,H:1000,J:1000,
  E:800,N:800,M:600,Q:600,R:600,S:600,I:400,K:400,L:400,P:400,
};
const SMALL_BY_DIV = {
  '19':140,'24':140,
  '10':120,'11':120,'14':120,'15':120,'20':120,'21':120,'23':120,'25':120,
  '26':120,'28':120,'29':120,'30':120,'32':120,'36':120,
  '12':80,'13':80,'16':80,'17':80,'18':80,'22':80,'27':80,'31':80,'33':80,
  '34':15,
};
const SMALL_BY_SEC = {
  D:120,H:100,K:100,A:80,B:80,F:80,G:60,J:50,E:40,L:40,
  M:30,N:30,R:30,I:15,P:15,Q:15,S:15,
};
// 비고: 의자 제조 관련 특례 코드
const SME_NOTES = {
  '30393': '비고: 자동차용 신품 의자 제조업은 중소기업 기준 1,500억원 이하 적용',
  '31202': '비고: 철도 차량용 의자 제조 부분은 중소기업 1,500억·소기업 120억 이하 적용',
  '31322': '비고: 항공기용 의자 제조 부분은 중소기업 1,500억·소기업 120억 이하 적용',
};
function smeInfo(code) {
  const p = pathOf(code);
  if (!p.length) return null;
  const sec = p[0].code;
  const div = code.slice(0, 2);
  if (sec === 'S' && div === '94') return null; // 협회 및 단체: 기준 제외
  let sme = SME_BY_DIV[div]; if (sme === undefined) sme = SME_BY_SEC[sec];
  let small = SMALL_BY_DIV[div]; if (small === undefined) small = SMALL_BY_SEC[sec];
  if (code === '30393') sme = 1500;
  if (sme === undefined && small === undefined) return null; // O, T, U 등 기준 없음
  return { sme, small, note: SME_NOTES[code] || null };
}

const norm = (s) => s.toLowerCase().replace(/[\s,·.\-()/;'"&]/g, '');

async function loadData() {
  const res = await fetch('ksic-data.json');
  const data = await res.json();
  for (const [code, name, level, parent] of data.tree) {
    NODES.set(code, { code, name, level, parent: parent || null });
    NAME_INDEX.push({ code, norm: norm(name), level });
  }
  for (const node of NODES.values()) {
    if (node.parent) {
      if (!CHILDREN.has(node.parent)) CHILDREN.set(node.parent, []);
      CHILDREN.get(node.parent).push(node.code);
    }
  }
  for (const arr of CHILDREN.values()) arr.sort();
  for (const [code, term] of data.terms) {
    const t = { code, term, norm: norm(term) };
    TERMS.push(t);
    if (!CODE_TERMS.has(code)) CODE_TERMS.set(code, []);
    CODE_TERMS.get(code).push(term);
  }
  for (const [nw, old, oldName] of (data.oldnew || [])) {
    if (!NEW2OLD.has(nw)) NEW2OLD.set(nw, []);
    NEW2OLD.get(nw).push({ old, oldName });
    if (!OLD2NEW.has(old)) OLD2NEW.set(old, []);
    if (!OLD2NEW.get(old).includes(nw)) OLD2NEW.get(old).push(nw);
  }
  DESC = data.desc || {};
  // 해설 본문의 5자리 참조 코드로 역참조(누가 이 코드를 제외/참조로 안내하는가) 인덱스 구축
  for (const code in DESC) {
    const d = DESC[code].d;
    if (!d) continue;
    const seen = new Set();
    for (const m of d.matchAll(/\d{5}/g)) {
      const ref = m[0];
      if (ref === code || seen.has(ref) || !NODES.has(ref)) continue;
      seen.add(ref);
      if (!REFS_IN.has(ref)) REFS_IN.set(ref, []);
      REFS_IN.get(ref).push(code);
    }
  }
  for (const [u, un, k] of (data.upjong || [])) {
    if (!UPJONG_BY_K.has(k)) UPJONG_BY_K.set(k, []);
    UPJONG_BY_K.get(k).push({ u, un });
    if (!UPJONG_BY_U.has(u)) UPJONG_BY_U.set(u, []);
    UPJONG_BY_U.get(u).push({ k, un });
    UPJONG_TERMS.push({ u, un, k, norm: norm(un) });
  }
  const descCnt = Object.values(DESC).filter(v => v.d).length;
  document.getElementById('hint').textContent =
    `세세분류 ${[...NODES.values()].filter(n=>n.level===5).length.toLocaleString()}개 · 색인어 ${TERMS.length.toLocaleString()}개 · 해설 ${descCnt.toLocaleString()}개 · 국세청 업종코드 ${UPJONG_BY_U.size.toLocaleString()}개`;
  renderTree();
  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) {
    document.getElementById('q').value = urlQ;
    runSearch();
  } else {
    renderHome();
  }
}

function pathOf(code) {
  const parts = [];
  let cur = NODES.get(code);
  while (cur) {
    parts.unshift(cur);
    cur = cur.parent ? NODES.get(cur.parent) : null;
  }
  return parts;
}

function search(query) {
  const qn = norm(query);
  if (!qn) return null;
  const tokens = query.trim().toLowerCase().split(/\s+/).map(norm).filter(t => t.length >= 1);
  const scores = new Map(); // code -> {score, terms:Set, oldHits:Set, uHits:Set}

  const add = (code, score, term, oldHit, uHit) => {
    let e = scores.get(code);
    if (!e) { e = { score: 0, terms: new Set(), oldHits: new Set(), uHits: new Set() }; scores.set(code, e); }
    if (score > e.score) e.score = score;
    if (term) e.terms.add(term);
    if (oldHit) e.oldHits.add(oldHit);
    if (uHit) e.uHits.add(uHit);
  };

  // 1) 코드 직접 검색 (11차)
  if (/^[0-9]{2,5}$/.test(qn) || /^[a-u]$/.test(qn)) {
    const up = qn.toUpperCase();
    for (const node of NODES.values()) {
      if (node.code === up) add(node.code, 100, null);
      else if (node.code.startsWith(up)) add(node.code, 90, null);
    }
    // 1-1) 10차(구) 코드로 검색 → 대응하는 11차 코드 제시
    if (/^[0-9]{5}$/.test(qn) && OLD2NEW.has(qn)) {
      for (const nw of OLD2NEW.get(qn)) {
        if (nw !== qn) add(nw, 95, null, qn);
      }
    }
  }
  // 1-2) 국세청 업종코드(6자리)로 검색 → 연계된 KSIC 제시
  if (/^[0-9]{6}$/.test(qn) && UPJONG_BY_U.has(qn)) {
    for (const { k, un } of UPJONG_BY_U.get(qn)) {
      add(k, 98, null, null, qn + ' ' + un);
    }
  }

  // 2) 색인어 검색 (세세분류 코드로 연결됨)
  for (const t of TERMS) {
    let s = 0;
    if (t.norm === qn) s = 100;
    else if (t.norm.startsWith(qn)) s = 88;
    else if (t.norm.includes(qn)) s = 74;
    else if (qn.length >= 2 && t.norm.length >= 2 && qn.includes(t.norm)) s = 58;
    else if (tokens.length > 1 && tokens.every(tok => t.norm.includes(tok))) s = 68;
    if (s) add(t.code, s, t.term);
  }

  // 2-1) 국세청 업종명 검색 (연계 KSIC 코드로 연결)
  for (const t of UPJONG_TERMS) {
    let s = 0;
    if (t.norm === qn) s = 82;
    else if (t.norm.includes(qn)) s = 64;
    else if (tokens.length > 1 && tokens.every(tok => t.norm.includes(tok))) s = 60;
    if (s) add(t.k, s, '[국세청 ' + t.u + '] ' + t.un);
  }

  // 2-2) 설명(해설) 본문 검색 — 정의·예시·제외 문구로도 코드를 찾는다
  for (const code in DESC) {
    const d = DESC[code].d;
    if (!d) continue;
    const dn = norm(d);
    let s = 0;
    if (dn.includes(qn)) s = 56;
    else if (tokens.length > 1 && tokens.every(tok => dn.includes(tok))) s = 54;
    if (s) add(code, s, null);
  }

  // 3) 분류항목명 검색 (모든 수준)
  for (const n of NAME_INDEX) {
    let s = 0;
    if (n.norm === qn) s = 96;
    else if (n.norm.includes(qn)) s = 76;
    else if (tokens.length > 1 && tokens.every(tok => n.norm.includes(tok))) s = 66;
    if (s) add(n.code, s, null);
  }

  const list = [...scores.entries()]
    .map(([code, e]) => ({ code, score: e.score, terms: [...e.terms], oldHits: [...e.oldHits], uHits: [...e.uHits], node: NODES.get(code) }))
    .filter(r => r.node)
    .sort((a, b) => b.score - a.score || b.node.level - a.node.level || a.code.localeCompare(b.code));
  return list.slice(0, 80);
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function highlight(term, query) {
  const raw = query.trim();
  if (!raw) return esc(term);
  const i = term.toLowerCase().indexOf(raw.toLowerCase());
  if (i < 0) return esc(term);
  return esc(term.slice(0, i)) + '<mark>' + esc(term.slice(i, i + raw.length)) + '</mark>' + esc(term.slice(i + raw.length));
}

function oldnewHTML(code) {
  const olds = NEW2OLD.get(code);
  if (!olds || !olds.length) return '';
  const same = olds.length === 1 && olds[0].old === code;
  if (same) return `<div class="oldnew"><span class="tag">10차 동일</span>구 분류(10차)에서도 같은 코드입니다.</div>`;
  const items = olds.map(o =>
    o.old === code ? `${esc(o.old)} (동일)` : `<b>${esc(o.old)}</b> ${esc(o.oldName)}`
  ).join(' · ');
  return `<div class="oldnew"><span class="tag diff">10차 연계</span>${items}</div>`;
}

function upjongHTML(code) {
  const ups = UPJONG_BY_K.get(code);
  if (!ups || !ups.length) return '';
  const shown = ups.slice(0, 4).map(o =>
    `<span class="chip clickable" title="${esc(o.un)} — 클릭하여 복사" onclick="event.stopPropagation();copyText('${o.u}')">${esc(o.u)} ${esc(o.un)}</span>`
  ).join('');
  const more = ups.length > 4 ? `<span class="chip more">+${ups.length - 4}</span>` : '';
  return `<div class="oldnew"><span class="tag nts">국세청 업종코드</span></div><div class="chips" style="margin-top:4px;">${shown}${more}</div>`;
}

function relatedHTML(code) {
  const node = NODES.get(code);
  if (!node) return '';
  const chip = (c) => {
    const n = NODES.get(c);
    return `<a href="#" class="relchip" onclick="event.preventDefault();event.stopPropagation();searchCode('${c}')">${esc(c)} ${esc(n ? n.name : '')}</a>`;
  };
  let html = '';
  // 형제 코드: 같은 상위(세분류) 아래 다른 세세분류
  if (node.parent) {
    const sibs = (CHILDREN.get(node.parent) || []).filter((c) => c !== code);
    if (sibs.length) {
      html += `<div class="reltitle">같은 세분류 내 다른 코드 <span>${sibs.length}</span></div>
        <div class="relchips">${sibs.map(chip).join('')}</div>`;
    }
  }
  // 역참조: 이 코드를 제외/참조 항목으로 안내하는 다른 분류
  const ins = (REFS_IN.get(code) || []).filter((c) => !NODES.get(code).parent || (CHILDREN.get(NODES.get(code).parent) || []).indexOf(c) < 0);
  if (ins.length) {
    html += `<div class="reltitle">이 코드로 안내하는 분류 <span>${ins.length}</span>
      <span class="relhelp" title="다른 분류의 제외·참조 항목에서 이 코드를 지목한 경우입니다">ⓘ</span></div>
      <div class="relchips">${ins.map(chip).join('')}</div>`;
  }
  return html ? `<div class="relbox">${html}</div>` : '';
}

function descHTML(code) {
  const d = DESC[code];
  if (!d || !d.d) return d && d.e
    ? `<div class="engname">${esc(d.e)}</div>` : '';
  // 설명 텍스트 내 5자리 코드(제외/이동 참조)를 클릭 가능한 링크로
  const lines = d.d.split('\n').map((line) => {
    let cls = 'dline';
    let label = '';
    if (line === '[예시]') { return '<div class="dsec inc">▸ 포함(예시)</div>'; }
    if (line === '[제외]') { return '<div class="dsec exc">▸ 제외</div>'; }
    if (line === '[주요활동]' || line === '[포함]') { return `<div class="dsec inc">▸ ${esc(line.slice(1,-1))}</div>`; }
    let html = esc(line).replace(/(\d{5})/g, (m) =>
      NODES.has(m) ? `<a href="#" class="xref" onclick="event.preventDefault();event.stopPropagation();searchCode('${m}')">${m}</a>` : m
    );
    return `<div class="${cls}">${html}</div>`;
  }).join('');
  const eng = d.e ? `<div class="engname">${esc(d.e)}</div>` : '';
  return `${eng}<div class="descbox">${lines}</div>`;
}

function smeHTML(code) {
  const s = smeInfo(code);
  if (!s) return '';
  const parts = [];
  if (s.sme !== undefined) parts.push(`중소기업 ${s.sme.toLocaleString()}억원 이하`);
  if (s.small !== undefined) parts.push(`소기업 ${s.small.toLocaleString()}억원 이하`);
  const note = s.note ? `<div class="smenote">${esc(s.note)}</div>` : '';
  return `<div class="oldnew"><span class="tag sme">중소기업 기준</span>평균매출액 ${parts.join(' · ')}
    <span class="smelaw" title="중소기업기본법 시행령 별표1(2025.10.1 개정)·별표3(2025.9.1 개정) 기준">ⓘ</span></div>${note}`;
}

function cardHTML(r, query) {
  const p = pathOf(r.code);
  const crumb = p.map((n, i) =>
    (i === p.length - 1 ? `<b>${esc(n.code)} ${esc(n.name)}</b>` : `${esc(n.code)} ${esc(n.name)}`)
  ).join(' &rsaquo; ');
  const chips = r.terms.slice(0, 6).map(t => `<span class="chip">${highlight(t, query)}</span>`).join('');
  const moreCnt = r.terms.length > 6 ? `<span class="chip more">+${r.terms.length - 6}</span>` : '';
  let oldHit = (r.oldHits && r.oldHits.length)
    ? `<div class="oldhit">구 분류(10차) ${esc(r.oldHits[0])} 에 해당하는 현행(11차) 코드입니다.</div>` : '';
  if (r.uHits && r.uHits.length) {
    oldHit += `<div class="oldhit">국세청 업종코드 ${esc(r.uHits[0])} 에 연계된 표준산업분류입니다.</div>`;
  }
  const faved = isFav(r.code);
  return `
  <div class="card" data-code="${r.code}" onclick="toggleDetail(event, '${r.code}')">
    <div class="row1">
      <span class="code">${esc(r.code)}</span>
      <span class="lv">${LV_NAME[r.node.level]}</span>
      <span class="name">${esc(r.node.name)}</span>
      <span class="actions">
        <button class="iconbtn ${faved ? 'faved' : ''}" onclick="toggleFav(event, '${r.code}')">${faved ? '★' : '☆'}</button>
        <button class="iconbtn" onclick="copyCode(event, '${r.code}')">코드 복사</button>
      </span>
    </div>
    <div class="path">${crumb}</div>
    ${r.node.level === 5 ? descHTML(r.code) + oldnewHTML(r.code) + smeHTML(r.code) + upjongHTML(r.code) : ''}
    ${oldHit}
    ${chips ? `<div class="chips">${chips}${moreCnt}</div>` : ''}
    ${r.node.level === 5 || (CHILDREN.get(r.code) || []).length ? '<div class="detailhint">▸ 클릭하면 관련 분류·색인어를 볼 수 있습니다</div>' : ''}
    <div class="detail" id="detail-${r.code}"></div>
  </div>`;
}

function toggleDetail(ev, code) {
  if (ev.target.closest('.iconbtn')) return;
  const el = document.getElementById('detail-' + code);
  if (!el) return;
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  let html = '';
  const kids = CHILDREN.get(code) || [];
  if (kids.length) {
    html += `<h4>하위 분류 (${kids.length}개)</h4><div class="children">` +
      kids.map(k => {
        const kn = NODES.get(k);
        return `<a href="#" onclick="event.preventDefault();event.stopPropagation();searchCode('${k}')">${esc(k)} · ${esc(kn.name)}</a>`;
      }).join('') + '</div>';
  }
  const rel = relatedHTML(code);
  if (rel) html += rel;
  const terms = CODE_TERMS.get(code) || [];
  if (terms.length) {
    html += `<h4 style="margin-top:8px;">이 코드의 색인어 전체 (${terms.length}개)</h4>
      <div class="chips">${terms.map(t => `<span class="chip">${esc(t)}</span>`).join('')}</div>`;
  }
  if (!html) html = '<h4>추가 정보가 없습니다.</h4>';
  el.innerHTML = html;
  el.classList.add('open');
}

function searchCode(code) {
  switchTab('search');
  const input = document.getElementById('q');
  input.value = code;
  runSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyCode(ev, code) {
  ev.stopPropagation();
  navigator.clipboard.writeText(code).then(() => showToast(`코드 ${code} 복사됨`));
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast(`${text} 복사됨`));
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

/* ---------- 즐겨찾기 / 최근 검색 ---------- */
function getLS(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } }
function setLS(key, v) { localStorage.setItem(key, JSON.stringify(v)); }
function isFav(code) { return getLS('ksic_fav').includes(code); }
function toggleFav(ev, code) {
  ev.stopPropagation();
  let favs = getLS('ksic_fav');
  if (favs.includes(code)) {
    favs = favs.filter(c => c !== code);
    showToast('즐겨찾기 해제');
  } else {
    favs.unshift(code);
    favs = favs.slice(0, 30);
    showToast('즐겨찾기 추가 ★');
  }
  setLS('ksic_fav', favs);
  const q = document.getElementById('q').value.trim();
  if (q) runSearch(); else renderHome();
}
function saveRecent(query) {
  let rec = getLS('ksic_recent').filter(r => r !== query);
  rec.unshift(query);
  setLS('ksic_recent', rec.slice(0, 10));
}

function renderHome() {
  const resEl = document.getElementById('results');
  const rec = getLS('ksic_recent');
  const favs = getLS('ksic_fav').filter(c => NODES.has(c));
  let html = '';
  if (rec.length) {
    html += `<div class="section-title">최근 검색</div><div class="chips">` +
      rec.map(r => `<span class="chip clickable" onclick="quickSearch('${esc(r).replace(/'/g, "\\'")}')">${esc(r)}</span>`).join('') +
      `</div>`;
  }
  if (favs.length) {
    html += `<div class="section-title">즐겨찾기 <span class="cnt">${favs.length}</span></div>`;
    html += favs.map(c => cardHTML({ code: c, score: 0, terms: [], oldHits: [], node: NODES.get(c) }, '')).join('');
  }
  if (!html) {
    html = '<div class="empty">물품명이나 업종명을 입력하면<br/>알맞은 산업분류코드를 찾아드립니다.<br/><br/>구 분류(10차) 5자리 코드는 현행 11차 코드로,<br/>국세청 업종코드(6자리)는 연계된 표준산업분류로 변환해드립니다.</div>';
  }
  resEl.innerHTML = html;
}

function quickSearch(q) {
  document.getElementById('q').value = q;
  runSearch();
}

/* ---------- CSV 내보내기 ---------- */
function exportCSV() {
  if (!lastResults.length) return;
  const rows = [['코드', '수준', '분류명', '영문명', '설명', '전체경로', '10차연계', '국세청업종코드', '중소기업기준(억원)', '소기업기준(억원)', '매칭색인어']];
  for (const r of lastResults) {
    const olds = (NEW2OLD.get(r.code) || []).map(o => o.old + (o.old === r.code ? '(동일)' : ' ' + o.oldName)).join('; ');
    const ups = (UPJONG_BY_K.get(r.code) || []).map(o => o.u + ' ' + o.un).join('; ');
    const s = r.node.level === 5 ? smeInfo(r.code) : null;
    const dd = DESC[r.code] || {};
    rows.push([
      r.code, LV_NAME[r.node.level], r.node.name,
      r.node.level === 5 ? (dd.e || '') : '',
      r.node.level === 5 ? (dd.d || '').replace(/\n/g, ' ') : '',
      pathOf(r.code).map(n => n.code + ' ' + n.name).join(' > '),
      r.node.level === 5 ? olds : '',
      r.node.level === 5 ? ups : '',
      s && s.sme !== undefined ? s.sme : '',
      s && s.small !== undefined ? s.small : '',
      r.terms.slice(0, 10).join('; '),
    ]);
  }
  const csv = '﻿' + rows.map(row =>
    row.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')
  ).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ksic_${lastQuery || 'results'}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('CSV 다운로드');
}

/* ---------- 분류 탐색 트리 ---------- */
function switchTab(tab) {
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-browse').classList.toggle('active', tab === 'browse');
  document.getElementById('panel-search').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('panel-browse').style.display = tab === 'browse' ? '' : 'none';
}

function countLeaves(code) {
  const kids = CHILDREN.get(code);
  if (!kids || !kids.length) return 1;
  return kids.reduce((a, k) => a + countLeaves(k), 0);
}

function renderTree() {
  const roots = [...NODES.values()].filter(n => n.level === 1).map(n => n.code);
  document.getElementById('treeroot').innerHTML =
    '<ul>' + roots.map(c => treeNodeHTML(c)).join('') + '</ul>';
}

function treeNodeHTML(code) {
  const n = NODES.get(code);
  const kids = CHILDREN.get(code) || [];
  const hasKids = kids.length > 0;
  return `<li class="tnode" id="tn-${code}">
    <div class="trow" onclick="toggleTree('${code}')">
      <span class="tw" id="tw-${code}">${hasKids ? '▶' : '·'}</span>
      <span class="tcode">${esc(code)}</span>
      <span>${esc(n.name)}</span>
      ${hasKids ? `<span class="tcount">${countLeaves(code)}</span>` : ''}
      <button class="tgo" onclick="event.stopPropagation();searchCode('${code}')">상세</button>
    </div>
    <div id="tc-${code}" style="display:none;"></div>
  </li>`;
}

function toggleTree(code) {
  const kids = CHILDREN.get(code) || [];
  if (!kids.length) { searchCode(code); return; }
  const box = document.getElementById('tc-' + code);
  const tw = document.getElementById('tw-' + code);
  if (box.style.display === 'none') {
    if (!box.innerHTML) box.innerHTML = '<ul>' + kids.map(k => treeNodeHTML(k)).join('') + '</ul>';
    box.style.display = '';
    tw.textContent = '▼';
  } else {
    box.style.display = 'none';
    tw.textContent = '▶';
  }
}

/* ---------- 검색 실행 ---------- */
function runSearch() {
  const query = document.getElementById('q').value;
  const resEl = document.getElementById('results');
  const list = search(query);
  if (list === null) {
    lastResults = []; lastQuery = '';
    history.replaceState(null, '', location.pathname);
    renderHome();
    return;
  }
  lastResults = list;
  lastQuery = query.trim();
  history.replaceState(null, '', location.pathname + '?q=' + encodeURIComponent(lastQuery));
  if (!list.length) {
    resEl.innerHTML = '<div class="empty">검색 결과가 없습니다.<br/>다른 단어(유의어)나 더 짧은 키워드로 검색해보세요.</div>';
    return;
  }
  saveRecent(lastQuery);
  const strong = list.filter(r => r.score >= 85);
  const similar = list.filter(r => r.score < 85);
  let html = `<div class="section-title">검색 결과 <span class="cnt">${list.length}</span>
    <span class="right"><button class="csvbtn" onclick="exportCSV()">CSV 저장</button></span></div>`;
  if (strong.length) {
    html += `<div class="section-title">정확 일치 <span class="cnt">${strong.length}</span></div>`;
    html += strong.map(r => cardHTML(r, query)).join('');
  }
  if (similar.length) {
    html += `<div class="section-title">비슷한 항목 <span class="cnt">${similar.length}</span></div>`;
    html += similar.map(r => cardHTML(r, query)).join('');
  }
  resEl.innerHTML = html;
}

let debounceTimer;
document.getElementById('q').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(runSearch, 150);
});
document.getElementById('q').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') runSearch();
});

loadData().catch((e) => {
  document.getElementById('results').innerHTML =
    `<div class="empty">데이터 로딩에 실패했습니다.<br/>${esc(String(e))}</div>`;
});
</script>
</body>
</html>
